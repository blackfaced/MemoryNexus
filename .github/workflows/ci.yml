name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      acceptance:
        description: "Run PostgreSQL + Qdrant acceptance tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  CARGO_TERM_COLOR: always

jobs:
  # 格式检查
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Clippy 检查
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D clippy::all

  # 构建
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo build --verbose --all-targets

  # 单元测试
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo test --all-features --all-targets
        timeout-minutes: 20

  surface-postgres:
    name: PostgreSQL Surface Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memorynexus_surface_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d memorynexus_surface_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memorynexus_surface_ci
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Decide whether Surface PostgreSQL tests are required
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > changed-files.txt
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed-files.txt
          else
            git ls-tree -r --name-only HEAD > changed-files.txt
          fi

          echo "Changed files:"
          cat changed-files.txt

          if grep -E '^(src/|tests/|migrations/|\.github/workflows/|Cargo\.toml$|Cargo\.lock$)' changed-files.txt >/dev/null; then
            echo "run_surface_postgres=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_surface_postgres=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip docs-only Surface PostgreSQL gate
        if: steps.changes.outputs.run_surface_postgres != 'true'
        run: echo "No Rust, tests, migrations, Cargo, or workflow changes; PostgreSQL Surface Integration context is intentionally green."
      - name: Enumerate Surface PostgreSQL integration targets
        if: steps.changes.outputs.run_surface_postgres == 'true'
        shell: bash
        run: |
          set -euo pipefail

          find tests -maxdepth 1 -type f -name 'surface_*_postgres_integration.rs' -print \
            | sort \
            | tee surface-postgres-files.txt

          if [[ ! -s surface-postgres-files.txt ]]; then
            echo "No tests/surface_*_postgres_integration.rs files were found."
            exit 1
          fi

          sed -E 's#^tests/##; s#\.rs$##' surface-postgres-files.txt \
            | tee surface-postgres-enumerated-targets.txt

          echo "Enumerated Surface PostgreSQL targets:"
          cat surface-postgres-enumerated-targets.txt
      - name: Run Surface PostgreSQL integration targets
        if: steps.changes.outputs.run_surface_postgres == 'true'
        shell: bash
        run: |
          set -euo pipefail
          : > surface-postgres-executed-targets.txt

          while IFS= read -r target; do
            echo "$target" | tee -a surface-postgres-executed-targets.txt
            cargo test --locked --test "$target" -- --ignored --test-threads=1
          done < surface-postgres-enumerated-targets.txt

          echo "Executed Surface PostgreSQL targets:"
          cat surface-postgres-executed-targets.txt

          diff -u surface-postgres-enumerated-targets.txt surface-postgres-executed-targets.txt
        timeout-minutes: 15

  acceptance:
    name: Acceptance
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.acceptance == 'true'
    services:
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memorynexus_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d memorynexus_acceptance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memorynexus_acceptance
      MEMORYNEXUS_ACCEPTANCE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memorynexus_acceptance
      QDRANT_URL: http://localhost:6333
      MEMORYNEXUS_EMBEDDING_PROVIDER: local
      MEMORYNEXUS_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:6333/readyz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Qdrant did not become ready"
          exit 1
      - name: Run local service acceptance
        run: cargo test --test phase1c_acceptance -- --ignored --nocapture
        timeout-minutes: 20
      - name: Run OpenRouter acceptance when configured
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MEMORYNEXUS_OPENROUTER_ACCEPTANCE: "1"
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY not configured; skipping OpenRouter acceptance."
            exit 0
          fi
          cargo test --test openrouter_acceptance -- --ignored --nocapture
        timeout-minutes: 20
