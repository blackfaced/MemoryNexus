name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ------------------------------
  # 代码检查
  # ------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy black
        pip install -r requirements.txt
        
    - name: Run Ruff
      run: ruff check src/
      
    - name: Run Black
      run: black --check src/
      
    - name: Run MyPy
      run: mypy src/

  # ------------------------------
  # 测试
  # ------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
        
    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_memorynexus
        REDIS_URL: redis://localhost:6379/0
        QDRANT_URL: http://localhost:6333
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
        
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml

  # ------------------------------
  # Docker 构建
  # ------------------------------
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build API image
      uses: docker/build-push-action@v5
      with:
        context: ./src
        push: false
        tags: memorynexus-api:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: false
        tags: memorynexus-frontend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ------------------------------
  # 集成测试
  # ------------------------------
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Start services
      run: docker-compose up -d db redis qdrant
      
    - name: Run API
      run: |
        docker-compose up -d api
        sleep 10
        
    - name: Health check
      run: |
        curl -f http://localhost:8000/health || exit 1
        
    - name: Run integration tests
      run: |
        # 运行集成测试
        echo "Integration tests placeholder"
        
    - name: Cleanup
      if: always()
      run: docker-compose down -v
