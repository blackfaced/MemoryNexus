name: Release Binaries

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
      TARGET: ${{ matrix.target }}
    steps:
      - name: Checkout release tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Checkout source
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        run: |
          cargo build --release --locked --target "$TARGET" \
            --bin memorynexus \
            --bin memorynexus-cli \
            --bin memorynexus-mcp

      - name: Package archive
        run: |
          set -euo pipefail
          archive_base="memorynexus-${RELEASE_TAG}-${TARGET}"
          package_dir="dist/${archive_base}"
          mkdir -p "$package_dir"

          cp "target/${TARGET}/release/memorynexus" "$package_dir/"
          cp "target/${TARGET}/release/memorynexus-cli" "$package_dir/"
          cp "target/${TARGET}/release/memorynexus-mcp" "$package_dir/"
          chmod 0755 "$package_dir/memorynexus" "$package_dir/memorynexus-cli" "$package_dir/memorynexus-mcp"

          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$package_dir" && sha256sum memorynexus memorynexus-cli memorynexus-mcp > SHA256SUMS)
          else
            (cd "$package_dir" && shasum -a 256 memorynexus memorynexus-cli memorynexus-mcp > SHA256SUMS)
          fi

          cat > "$package_dir/MANIFEST.txt" <<EOF
          MemoryNexus ${RELEASE_TAG}
          Target: ${TARGET}

          Binaries:
          - memorynexus
          - memorynexus-cli
          - memorynexus-mcp
          - SHA256SUMS
          - PROFILE_SUPPORT.txt
          EOF

          cat > "$package_dir/PROFILE_SUPPORT.txt" <<EOF
          MemoryNexus release artifact profiles

          Trial Profile:
          - Uses memorynexus-mcp when an agent connects to an existing or separately managed MemoryNexus API.

          Local One-click Profile:
          - Uses memorynexus, memorynexus-cli, and memorynexus-mcp together.
          - PostgreSQL and Qdrant remain external services, commonly through Docker.

          Production Profile:
          - May use memorynexus, memorynexus-cli, and memorynexus-mcp as service artifacts.
          - Hosted service provider selection is outside this release artifact.

          Developer Profile:
          - Source-build workflow remains unchanged through cargo run and cargo build.
          EOF

          tar -C dist -czf "dist/${archive_base}.tar.gz" "$archive_base"

          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive_base}.tar.gz" > "${archive_base}.tar.gz.sha256"
          else
            shasum -a 256 "${archive_base}.tar.gz" > "${archive_base}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: memorynexus-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          path: |
            dist/memorynexus-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            dist/memorynexus-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          MemoryNexus ${RELEASE_TAG} release binaries.

          Supported platform triples:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - x86_64-unknown-linux-gnu

          Each archive includes:
          - memorynexus
          - memorynexus-cli
          - memorynexus-mcp
          - SHA256SUMS
          - PROFILE_SUPPORT.txt

          Artifact profile support:
          - Trial Profile can use memorynexus-mcp when the API is already available.
          - Local One-click Profile can use all three binaries with external PostgreSQL and Qdrant.
          - Production Profile may use the same binaries as service artifacts.
          - Developer Profile source-build workflow remains unchanged.

          Archive checksums are published as matching .sha256 files.
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: MemoryNexus ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
