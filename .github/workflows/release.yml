name: Release Binaries

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - "scripts/package-local-one-click.sh"
      - "scripts/test-package-local-one-click.sh"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
      TARGET: ${{ matrix.target }}
    steps:
      - name: Checkout release tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Checkout source
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v5

      - name: Smoke test package layout
        run: scripts/test-package-local-one-click.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        run: |
          cargo build --release --locked --target "$TARGET" \
            --bin memorynexus \
            --bin memorynexus-cli \
            --bin memorynexus-mcp

      - name: Package archive
        run: |
          set -euo pipefail
          scripts/package-local-one-click.sh \
            --release-tag "$RELEASE_TAG" \
            --target "$TARGET" \
            --binary-dir "target/${TARGET}/release" \
            --dist-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: memorynexus-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          path: |
            dist/memorynexus-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            dist/memorynexus-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          MemoryNexus ${RELEASE_TAG} release binaries.

          Supported platform triples:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - x86_64-unknown-linux-gnu

          Each archive includes:
          - bin/memorynexus
          - bin/memorynexus-cli
          - bin/memorynexus-mcp
          - SHA256SUMS
          - docker-compose.runtime.yml
          - .env.runtime.example
          - install.sh
          - README.local-one-click.md
          - MANIFEST.json

          Artifact profile support:
          - Trial Profile can use bin/memorynexus-mcp when the API is already available.
          - Local One-click Profile can use all three binaries with bundled runtime compose files for local PostgreSQL and Qdrant.
          - Production Profile may use the same binaries as service artifacts for serious hosted use.
          - Developer Profile source-build workflow remains unchanged.

          Archive checksums are published as matching .sha256 files.
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: MemoryNexus ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
