services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memorynexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memorynexus_local}
      POSTGRES_DB: ${POSTGRES_DB:-memorynexus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - memorynexus_runtime_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - memorynexus_runtime_qdrant_data:/qdrant/storage

volumes:
  memorynexus_runtime_postgres_data:
  memorynexus_runtime_qdrant_data:
